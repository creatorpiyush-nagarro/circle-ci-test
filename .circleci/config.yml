version: 2.1

jobs:
  build_all:
    macos:
      xcode: 26.2.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - fvm-cache-macos-{{ checksum ".fvmrc" }}
            - fvm-cache-macos-
      - run:
          name: "Install FVM"
          command: |
            brew tap leoafarias/fvm
            brew install fvm
            echo 'export PATH="$HOME/fvm/bin:$PATH"' >> $BASH_ENV
            echo 'export FVM_CACHE_PATH="$HOME/.fvm/versions"' >> $BASH_ENV
      - run:
          name: "Install project Flutter version"
          command: fvm install
      - save_cache:
          key: fvm-cache-macos-{{ checksum ".fvmrc" }}
          paths:
            - ".fvm/flutter_sdk"
            - "~/.fvm"
      - run:
          name: "Flutter pub get"
          command: fvm flutter pub get
      - run:
          name: "Run Flutter tests with coverage"
          command: fvm flutter test --coverage
      - store_test_results:
          path: coverage/lcov.info
      - run:
          name: "Build Android APK"
          command: fvm flutter build apk --debug
      - run:
          name: "Build iOS (No Codesign)"
          command: fvm flutter build ios --no-codesign --release
      - store_artifacts:
          path: build/app/outputs/flutter-apk/app-debug.apk
          destination: app-debug.apk
      - store_artifacts:
          path: coverage/lcov.info
          destination: coverage-report.info

workflows:
  version: 2
  flutter_ci:
    jobs:
      - build_all
